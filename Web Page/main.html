<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polycube Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Écran d'accueil pour l'ID et les permissions -->
    <div id="lobby">
        <div class="lobby-content">
            <h1 id="display-id">ID: GEN...</h1>
            <p>Prêt pour la partie ?</p>
            <button id="btn-join">REJOINDRE</button>
        </div>
    </div>

    <!-- Interface de jeu (cachée au début) -->
    <div class="status-bar">
        <div class="status" id="connection-status">Connexion au serveur...</div>
        <div id="debug">Capteurs : Inactifs</div>
    </div>

    <div class="controls-container">
        <div class="btn" id="btn-H">H</div>
        <div class="btn" id="btn-Pause">Pause</div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
