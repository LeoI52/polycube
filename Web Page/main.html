<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polycube Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Ecran de Lobby : Sélection du joueur -->
    <div id="lobby">
        <div class="lobby-content">
            <h1>POLYCUBE</h1>
            <p>Choose your player :</p>
            <div class="slot-grid">
                <button class="slot-btn available" id="slot-1" onclick="selectSlot(1)">Player 1</button>
                <button class="slot-btn available" id="slot-2" onclick="selectSlot(2)">Player 2</button>
                <button class="slot-btn available" id="slot-3" onclick="selectSlot(3)">Player 3</button>
                <button class="slot-btn available" id="slot-4" onclick="selectSlot(4)">Player 4</button>
            </div>
            <div id="lobby-status">Ready for connection...</div>
        </div>
        <button id="btn-test">TEST MODE</button>
    </div>

    <!-- Écran de Calibration Obligatoire -->
    <div id="calibration-overlay" style="display: none;">
        <div class="calib-content">
            <div class="calib-icon">📏</div>
            <h2>CALIBRATION</h2>
            <p id="calib-instruction">Put your phone down on a <strong>flat surface</strong> and do not touch it.</p>
            
            <div class="progress-container">
                <div id="calib-progress-bar"></div>
            </div>
            
            <p id="calib-status">Waiting for stabilization...</p>
        </div>
    </div>

    <!-- Interface Manette (masquée pendant la calib) -->
    <div id="controller-ui" style="visibility: hidden;">
        <div class="status-bar">
            <div class="status" id="connection-status">Server...</div>
            <div id="debug">Sensors : Ready</div>
            <button class="btn-calibrate-mini" onclick="startCalibrationFlow()">RE-CALIBRATE</button>
        </div>

        <div class="controls-container">
            <div class="btn" id="btn-H">Press</div>
            <BR/>
            <div class="btn" id="btn-Pause">Back</div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
