<!DOCTYPE html>
<html lang="fr">
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accéléromètre Pro</title>

</head>

<body>

    <div class="card">
        <h1>Accéléromètre</h1>
        <button id="startButton">Démarrer</button>
        <button id="stopButton" disabled>Arrêter</button>

        <p id="status">Statut : En attente</p>
        <hr>
        <p>X: <span id="x" class="data">0.00</span> m/s²</p>
        <p>Y: <span id="y" class="data">0.00</span> m/s²</p>
        <p>Z: <span id="z" class="data">0.00</span> m/s²</p>
    </div>


</body>
