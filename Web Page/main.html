<!DOCTYPE html>
<html lang="fr">
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accéléromètre Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>

</head>

<body>
    <div class="status-bar">
        <div class="status" id="connection-status">Connexion au Raspberry Pi...</div>
        <div id="debug">Capteurs : Inactifs</div>
    </div>

    <div class="controls-container">
        <!-- Bouton H -->
        <div class="btn" id="btn-H">H</div>
        <!-- Bouton Pause -->
        <div class="btn" id="btn-Pause">Pause</div>
    </div>

    <!-- Nécessaire pour les navigateurs mobiles (iOS/Android récents) -->
    <button id="request-perms">Autoriser les capteurs</button>
</body>

</html>
