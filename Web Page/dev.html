<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Polycube - Dev Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { 
            background: #0f172a; 
            color: #f1f5f9; 
            font-family: 'Consolas', monospace; 
            padding: 20px; 
            margin: 0;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { color: #38bdf8; margin: 0; font-size: 1.5rem; }

        .btn-kick {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-kick:hover { background: #dc2626; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: #1e293b; 
            border-radius: 8px; 
            padding: 15px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .card-header { 
            font-weight: bold; 
            color: #fbbf24; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
        }

        .stat { 
            margin: 5px 0; 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.9rem;
        }

        .val { color: #4ade80; }

        .btn-status { 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 11px; 
            background: #334155; 
        }
        
        .btn-status.active { background: #ef4444; color: white; }

        .sensor-group { 
            margin-top: 10px; 
            padding-top: 10px; 
            border-top: 1px solid #334155; 
        }

        .sensor-title { 
            font-size: 0.75rem; 
            color: #94a3b8; 
            display: block; 
            margin-bottom: 5px; 
            text-transform: uppercase;
        }

        #no-devices {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>Polycube Console - Monitor</h1>
        <button class="btn-kick" onclick="kickAll()">RÉINITIALISER TOUTES LES MANETTES</button>
    </header>

    <div id="no-devices">Aucun contrôleur actif.</div>
    <div class="grid" id="dashboard"></div>

    <script>
        const socket = io();
        const dashboard = document.getElementById('dashboard');
        const noDevices = document.getElementById('no-devices');

        // Action de Kick All
        function kickAll() {
            if(confirm("Voulez-vous vraiment déconnecter et réinitialiser tous les utilisateurs ?")) {
                socket.emit('kick_all');
            }
        }

        // Mise à jour de l'affichage des données
        socket.on('update_dashboard', (controllers) => {
            const ids = Object.keys(controllers);
            
            if (ids.length > 0) {
                noDevices.style.display = 'none';
            } else {
                noDevices.style.display = 'block';
                dashboard.innerHTML = '';
                return;
            }

            dashboard.innerHTML = '';

            ids.forEach(id => {
                const data = controllers[id];
                const accel = data.sensors.accel || { x: 0, y: 0, z: 0 };
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <span>📱 ID: ${id}</span>
                    </div>
                    
                    <div class="stat">
                        <span>Bouton H:</span>
                        <span class="btn-status ${data.buttons.H ? 'active' : ''}">${data.buttons.H ? 'ON' : 'OFF'}</span>
                    </div>
                    <div class="stat">
                        <span>Bouton Pause:</span>
                        <span class="btn-status ${data.buttons.Pause ? 'active' : ''}">${data.buttons.Pause ? 'ON' : 'OFF'}</span>
                    </div>

                    <div class="sensor-group">
                        <span class="sensor-title">ORIENTATION (DEGRÉS)</span>
                        <div class="stat"><span>Alpha:</span> <span class="val">${data.sensors.alpha}°</span></div>
                        <div class="stat"><span>Beta:</span> <span class="val">${data.sensors.beta}°</span></div>
                        <div class="stat"><span>Gamma:</span> <span class="val">${data.sensors.gamma}°</span></div>
                    </div>

                    <div class="sensor-group">
                        <span class="sensor-title">ACCÉLÉROMÈTRE (M/S²)</span>
                        <div class="stat"><span>X:</span> <span class="val">${accel.x.toFixed(3)}</span></div>
                        <div class="stat"><span>Y:</span> <span class="val">${accel.y.toFixed(3)}</span></div>
                        <div class="stat"><span>Z:</span> <span class="val">${accel.z.toFixed(3)}</span></div>
                    </div>
                `;
                dashboard.appendChild(card);
            });
        });
    </script>
</body>
</html>
