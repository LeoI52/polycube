<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Polycube - Dev Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Consolas', monospace;
            padding: 20px;
        }
        h1 { color: #38bdf8; border-bottom: 2px solid #1e293b; padding-bottom: 10px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .card-header {
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat { margin: 5px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .val { color: #4ade80; }
        .btn-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: #334155;
            text-transform: uppercase;
        }
        .btn-status.active { background: #ef4444; color: white; }
        .sensor-group {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #334155;
        }
        .sensor-title {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>
    <h1>Polycube Console - Real-time Monitoring</h1>
    <div id="no-devices">Aucun périphérique connecté.</div>
    <div class="grid" id="dashboard"></div>

    <script>
        const socket = io();
        const dashboard = document.getElementById('dashboard');
        const noDevices = document.getElementById('no-devices');

        socket.on('update_dashboard', (controllers) => {
            const ids = Object.keys(controllers);
            
            if (ids.length > 0) {
                noDevices.style.display = 'none';
            } else {
                noDevices.style.display = 'block';
                dashboard.innerHTML = '';
                return;
            }

            dashboard.innerHTML = ''; 

            ids.forEach(id => {
                const data = controllers[id];
                const card = document.createElement('div');
                card.className = 'card';
                
                // Accéléromètre en G (valeurs reçues du script.js)
                const accel = data.sensors.accel || { x: 0, y: 0, z: 0 };
                
                card.innerHTML = `
                    <div class="card-header">
                        <span>📱 ID: ${id}</span>
                    </div>
                    
                    <div class="stat">
                        <span>Bouton H:</span>
                        <span class="btn-status ${data.buttons.H ? 'active' : ''}">${data.buttons.H ? 'PRESSÉ' : 'REPOS'}</span>
                    </div>
                    <div class="stat">
                        <span>Bouton Pause:</span>
                        <span class="btn-status ${data.buttons.Pause ? 'active' : ''}">${data.buttons.Pause ? 'PRESSÉ' : 'REPOS'}</span>
                    </div>

                    <div class="sensor-group">
                        <span class="sensor-title">ORIENTATION (DEGRÉS)</span>
                        <div class="stat"><span>Boussole (α):</span> <span class="val">${data.sensors.alpha}°</span></div>
                        <div class="stat"><span>Pitch (β):</span> <span class="val">${data.sensors.beta}°</span></div>
                        <div class="stat"><span>Roll (γ):</span> <span class="val">${data.sensors.gamma}°</span></div>
                    </div>

                    <div class="sensor-group">
                        <span class="sensor-title">ACCÉLÉROMÈTRE (G)</span>
                        <div class="stat"><span>Axe X:</span> <span class="val">${accel.x.toFixed(3)} g</span></div>
                        <div class="stat"><span>Axe Y:</span> <span class="val">${accel.y.toFixed(3)} g</span></div>
                        <div class="stat"><span>Axe Z:</span> <span class="val">${accel.z.toFixed(3)} g</span></div>
                    </div>
                `;
                dashboard.appendChild(card);
            });
        });
    </script>
</body>
</html>
